<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect
      const path = window.location.pathname
        .replace('/szewczyk-law', '')
        .replace(/^\//, '')
      if (path) {
        sessionStorage.setItem('redirect', path)
      }
      window.location.replace('/szewczyk-law/')
    </script>
  </head>
  <body></body>
</html>
